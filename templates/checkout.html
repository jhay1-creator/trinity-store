<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout Gateway</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f4f5; color: #1c1c1e; margin: 0; padding: 0; }
        .navbar { display: flex; align-items: center; background: #ffffff; padding: 15px 5%; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .logo { font-size: 1.6em; font-weight: 800; color: #f39c12; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; }
        .container { max-width: 700px; margin: 40px auto; background: white; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { border-bottom: 1px solid #e4e4e7; padding-bottom: 15px; margin-top: 0; color: #1a202c; font-weight: 700; }
        .summary-box { background: #f8f9fa; border: 1px solid #e4e4e7; padding: 15px 20px; border-radius: 6px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px;}
        input { width: 100%; padding: 12px; background: #ffffff; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 1em; color: #2d3748; }
        input:focus { border-color: #f39c12; outline: none; }
        .btn-pay { background: #2ecc71; color: white; border: none; width: 100%; padding: 15px; font-size: 1.1em; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 12px rgba(46,204,113,0.2); }
        .btn-pay:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/" class="logo">⚡ Trinity Drops</a>
    </div>

    <div class="container">
        <h2>🔒 Secure Settlement Gateway</h2>

        <div class="summary-box">
            <div>
                <h4 style="margin:0 0 5px 0; font-size:1.1em;">{{ product.title }}</h4>
                <span style="background:#e4e4e7; padding:3px 8px; border-radius:4px; font-size:0.85em; font-weight:600;">Size: {{ size }}</span>
            </div>
            <h3 style="margin:0; color:#f39c12;">{{ price_str }}</h3>
        </div>

        <form action="" method="POST">
            <div class="form-group">
                <label>Shipping Target Destination Address</label>
                <input type="text" name="address" placeholder="Input complete delivery building street details" required>
            </div>

            <div class="form-group">
                <label>Contact Mobile Slot (Phone)</label>
                <input type="text" name="phone" value="{{ user_data.phone or '' }}" placeholder="Enter receiving phone contact structure" required>
            </div>

            <div class="form-group">
                <label>Card Authentication Parameter (Number / Expiry / CVV Matrix)</label>
                <input type="text" name="card_details" placeholder="0000 0000 0000 0000 - MM/YY - CVV" required>
            </div>

            <button type="submit" class="btn-pay">Authorize Settlement & Dispatch Order</button>
        </form>
    </div>

</body>
</html>
