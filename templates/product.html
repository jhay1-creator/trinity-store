<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.title }} - Trinity Drops</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .product-container { max-width: 600px; margin: 40px auto; background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); }

        /* Gallery Styles */
        .gallery-container { width: 100%; margin-bottom: 20px; }
        .product-image { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; border: 1px solid #475569; display: block; }
        .thumbnail-row { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .thumbnail { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; border: 2px solid #475569; cursor: pointer; transition: border-color 0.2s; }
        .thumbnail:hover, .thumbnail.active { border-color: #f59e0b; }

        .product-title { font-size: 1.8em; margin: 0 0 10px 0; color: #fff; }
        .product-price { font-size: 1.5em; color: #f59e0b; font-weight: bold; margin-bottom: 20px; }
        .selector-label { display: block; margin-bottom: 8px; color: #94a3b8; font-weight: 500; }
        select { width: 100%; padding: 12px; background: #0f172a; color: #fff; border: 1px solid #475569; border-radius: 6px; font-size: 1em; margin-bottom: 25px; outline: none; }
        .btn-checkout { display: block; width: 100%; padding: 14px; background: #f59e0b; color: #0f172a; text-align: center; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; text-decoration: none; transition: background 0.2s; width: 100%; box-sizing: border-box; }
        .btn-checkout:hover { background: #d97706; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #94a3b8; text-decoration: none; font-size: 0.9em; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="product-container">
        <a href="/" class="back-link">⬅️ Back to Storefront</a>

        <div class="gallery-container">
            <img id="mainProductImage" src="{{ product.image }}" alt="{{ product.title }}" class="product-image">

            <div class="thumbnail-row">
                {% if product.images %}
                    {% for img_url in product.images %}
                        <img src="{{ img_url }}" class="thumbnail {% if loop.first %}active{% endif %}" onclick="switchMainImage(this)">
                    {% endfor %}
                {% else %}
                    <img src="{{ product.image }}" class="thumbnail active">
                {% endif %}
            </div>
        </div>

        <h1 class="product-title">{{ product.title }}</h1>
        <div class="product-price">{{ price_str }}</div>

        <label class="selector-label" for="sizeSelector">Select Your Size Tag:</label>
        <select id="sizeSelector">
            {% for size in product.sizes %}
                <option value="{{ size }}">{{ size }}</option>
            {% endfor %}
        </select>

        <button onclick="forwardToCheckout('{{ product.id }}')" class="btn-checkout">Proceed to Secure Checkout</button>
    </div>

    <script>
        // Swaps the main big image when clicking a thumbnail preview
        function switchMainImage(thumbnailElement) {
            document.getElementById('mainProductImage').src = thumbnailElement.src;

            // Remove active border highlight from all thumbs, add to clicked one
            document.querySelectorAll('.thumbnail').forEach(thumb => thumb.classList.remove('active'));
            thumbnailElement.classList.add('active');
        }

        function forwardToCheckout(productId) {
            var selectedSize = document.getElementById('sizeSelector').value;
            window.location.href = '/checkout/' + productId + '?size=' + encodeURIComponent(selectedSize);
        }
    </script>
</body>
</html>
